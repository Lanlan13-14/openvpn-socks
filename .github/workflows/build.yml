name: Build Docker Image to Personal GHCR

on:
  workflow_dispatch:
    inputs:
      tag:
        description: '镜像 tag'
        required: true
        default: 'v1.0.0'

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set image names
        run: |
          OWNER_LOWER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          VERSION_TAG=${{ github.event.inputs.tag }}
          echo "IMAGE_TAG=ghcr.io/${OWNER_LOWER}/ovpn-socks5:${VERSION_TAG}" >> $GITHUB_ENV
          echo "IMAGE_LATEST=ghcr.io/${OWNER_LOWER}/ovpn-socks5:latest" >> $GITHUB_ENV

      - name: Log in to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build -t $IMAGE_TAG -t $IMAGE_LATEST .

      - name: Push Docker image
        run: |
          docker push $IMAGE_TAG
          docker push $IMAGE_LATEST