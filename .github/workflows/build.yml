name: Build Docker Image to Personal GHCR

on:
  workflow_dispatch:
    inputs:
      tag:
        description: '镜像 tag'
        required: true
        default: 'v1.0.0'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 拉取仓库代码
      - uses: actions/checkout@v4

      # 设置镜像名，注意全小写，OWNER 必须是你的个人账户名
      - name: Set image name
        run: |
          echo "IMAGE_NAME=ghcr.io/lanlan13/ovpn-socks5:${{ github.event.inputs.tag }}" >> $GITHUB_ENV

      # 登录 GHCR（个人账户 + 默认 GITHUB_TOKEN）
      - name: Log in to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 构建 Docker 镜像
      - name: Build Docker image
        run: docker build -t $IMAGE_NAME .

      # 推送镜像到 GHCR
      - name: Push Docker image
        run: docker push $IMAGE_NAME